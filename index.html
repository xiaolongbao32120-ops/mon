
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแยกข้อมูลสินค้าน้ำมัน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; margin: 0; padding: 40px 20px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; color: #2d3436; overflow-x: hidden; }
        .sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #e0f2fe 0%, #fdfbfb 100%); z-index: -5; }
        .container { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04); width: 100%; max-width: 1000px; text-align: center; z-index: 10; position: relative; }
        h2 { margin: 0 0 30px; font-weight: 400; font-size: 26px; }
        .upload-btn, .download-btn { font-family: 'Prompt', sans-serif; background-color: #2d3436; color: white; padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer; font-size: 16px; transition: all 0.3s; display: inline-block; }
        .upload-btn:hover { background-color: #000; transform: translateY(-2px); }
        input[type="file"] { display: none; }
        .download-btn { background-color: #ffffff; color: #2d3436; border: 1px solid #dfe6e9; display: none; margin-left: 10px; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 35px; }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
        th, td { padding: 12px; border-bottom: 1px solid rgba(0, 0, 0, 0.05); font-size: 14px; }
        th { font-weight: 500; color: #636e72; border-bottom: 2px solid #2d3436; }
    </style>
</head>
<body>
    <div class="sky"></div>
    <div class="container">
        <h2>ระบบแยกข้อมูลสินค้า</h2>
        <label for="excelFile" class="upload-btn">เลือกไฟล์ Excel</label>
        <input type="file" id="excelFile" accept=".xlsx, .xls">
        <button id="downloadBtn" class="download-btn">ดาวน์โหลด Excel ใหม่</button>
        <div class="table-responsive" id="tableContainer"></div>
    </div>

    <script>
        let processedData = [];

        function formatPhoneNumber(phone) {
            let str = phone ? phone.toString().trim() : '';
            if (str.length === 9) {
                return '0' + str;
            }
            return str;
        }

        document.getElementById('excelFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                parseData(json);
            };
            reader.readAsArrayBuffer(file);
        });

        function parseData(data) {
            if (!data || data.length < 2) return;
            const headers = data[0];
            const pIdx = headers.indexOf('สินค้า');
            
            processedData = [];
            let newHeaders = [...headers];
            newHeaders.splice(pIdx + 1, 0, 'ชื่อสินค้า', 'รหัสสินค้า');
            newHeaders[9] = 'รวมข้อมูล'; 
            processedData.push(newHeaders);

            for (let i = 1; i < data.length; i++) {
                let row = [...data[i]];
                
                // แยกสินค้า
                const cellValue = row[pIdx] ? row[pIdx].toString().trim() : '';
                const parts = cellValue.split(/\s+/);
                const code = parts[0] || '';
                const name = parts.slice(1).join(' ') || '';
                row.splice(pIdx + 1, 0, name, code);

                // ดึงข้อมูลและปรับเบอร์โทร
                const colC = row[2] ? row[2].toString().trim() : '';
                const colD = row[3] ? row[3].toString().trim() : '';
                const colE = formatPhoneNumber(row[4]); // ปรับเบอร์โทรที่ index 4
                row[4] = colE; 
                
                // รวมข้อมูลด้วย B2B
                row[9] = `B2B ${colC} ${colD} ${colE}`.trim();

                processedData.push(row);
            }
            displayTable(processedData);
            document.getElementById('downloadBtn').style.display = 'inline-block';
        }

        function displayTable(data) {
            let html = '<table><tr>' + data[0].map(h => `<th>${h}</th>`).join('') + '</tr>';
            for (let i = 1; i < data.length; i++) {
                html += '<tr>' + data[i].map(c => `<td>${c || ''}</td>`).join('') + '</tr>';
            }
            document.getElementById('tableContainer').innerHTML = html + '</table>';
        }

        document.getElementById('downloadBtn').addEventListener('click', () => {
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(processedData), "Sheet1");
            XLSX.writeFile(wb, "updated_products.xlsx");
        });
    </script>
</body>
</html>
